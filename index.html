<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>구간반복 MP3 플레이어</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/feather-icons"></script>

  <style>
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #404040; border-radius: 10px; }
    
    .light-scrollbar::-webkit-scrollbar { width: 6px; }
    .light-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .light-scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }

    .no-scroll { 
      overflow: hidden; 
      position: fixed; 
      width: 100%; 
      height: 100%; 
    }

    .header-safe-area {
      padding-top: max(1.5rem, env(safe-area-inset-top));
    }
  </style>
</head>
<body class="bg-[#171717] text-white m-0 p-0 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    const DB_NAME = "AudioPlayerDB";
    const DB_VERSION = 1;
    const STORE_NAME = "mediaFiles";

    const initDB = () => {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
        };
        request.onsuccess = (e) => resolve(e.target.result);
        request.onerror = (e) => reject(e.target.error);
      });
    };

    const saveToDB = async (key, file) => {
      const db = await initDB();
      const tx = db.transaction(STORE_NAME, "readwrite");
      tx.objectStore(STORE_NAME).put(file, key);
    };

    const loadFromDB = async (key) => {
      const db = await initDB();
      return new Promise((resolve) => {
        const request = db.transaction(STORE_NAME, "readonly").objectStore(STORE_NAME).get(key);
        request.onsuccess = () => resolve(request.result);
      });
    };

    const Icon = ({ name, className = "" }) => {
      if (!window.feather || !window.feather.icons[name]) return null;
      const svgString = window.feather.icons[name].toSvg({ class: className });
      return <span dangerouslySetInnerHTML={{ __html: svgString }} className="flex items-center justify-center" />;
    };

    const formatTime = (totalSeconds) => {
      if (isNaN(totalSeconds)) return "00:00";
      const h = Math.floor(totalSeconds / 3600);
      const m = Math.floor((totalSeconds % 3600) / 60);
      const s = Math.floor(totalSeconds % 60);
      if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
      return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    };

    const parseSRT = (srtText) => {
      const timeToSeconds = (t) => {
        const parts = t.replace(',', '.').split(':');
        return parts.length === 3 ? parseInt(parts[0])*3600 + parseInt(parts[1])*60 + parseFloat(parts[2]) : 0;
      };
      return srtText.replace(/\r/g, '').trim().split(/\n\s*\n/).map(block => {
        const lines = block.split('\n');
        if (lines.length < 3) return null;
        const [start, end] = lines[1].split(' --> ');
        return { id: lines[0], start: timeToSeconds(start), end: timeToSeconds(end), text: lines.slice(2).join('\n') };
      }).filter(Boolean);
    };

    function App() {
      const audioRef = useRef(null);
      const subtitleListRef = useRef(null);
      
      const [audioSrc, setAudioSrc] = useState(null);
      const [audioFileName, setAudioFileName] = useState("");
      const [subtitles, setSubtitles] = useState([]);
      const [srtFileName, setSrtFileName] = useState("");
      const [isPlaying, setIsPlaying] = useState(false);
      const [currentTime, setCurrentTime] = useState(0);
      const [duration, setDuration] = useState(0);
      const [currentSubtitleIndex, setCurrentSubtitleIndex] = useState(-1);
      const [showSubtitleList, setShowSubtitleList] = useState(false);
      const [playbackRate, setPlaybackRate] = useState(1.0);
      const [showUploader, setShowUploader] = useState(true);
      const [isLightMode, setIsLightMode] = useState(false);

      useEffect(() => {
        const load = async () => {
          const lastAudio = await loadFromDB('lastAudio');
          if (lastAudio) { setAudioSrc(URL.createObjectURL(lastAudio)); setAudioFileName(lastAudio.name); setShowUploader(false); }
          const lastSrt = await loadFromDB('lastSrt');
          if (lastSrt) {
            setSrtFileName(lastSrt.name);
            const reader = new FileReader();
            reader.onload = (e) => setSubtitles(parseSRT(e.target.result));
            reader.readAsText(lastSrt, 'utf-8');
          }
        };
        load();
      }, []);

      useEffect(() => {
        if (audioRef.current) audioRef.current.playbackRate = playbackRate;
      }, [playbackRate, audioSrc]);

      useEffect(() => {
        if (showSubtitleList) document.body.classList.add('no-scroll');
        else document.body.classList.remove('no-scroll');
      }, [showSubtitleList]);

      const togglePlay = useCallback(() => {
        if (!audioRef.current || !audioSrc) return;
        if (isPlaying) audioRef.current.pause();
        else audioRef.current.play();
        setIsPlaying(!isPlaying);
      }, [isPlaying, audioSrc]);

      const handleSubtitleClick = (index, subStart) => {
        if (index === currentSubtitleIndex) {
          togglePlay();
        } else {
          if (audioRef.current) {
            audioRef.current.currentTime = subStart;
            setCurrentTime(subStart);
            audioRef.current.play();
            setIsPlaying(true);
          }
        }
      };

      const handleAudioUpload = async (e) => {
        const files = Array.from(e.target.files || []);
        let audioFile = files.find(f => f.type.startsWith('audio/') || f.name.match(/\.(mp3|wav|m4a|ogg|aac|flac)$/i));
        let srtFile = files.find(f => f.name.match(/\.srt$/i));
        
        if (audioFile) {
          setAudioSrc(URL.createObjectURL(audioFile));
          setAudioFileName(audioFile.name);
          setIsPlaying(false);
          await saveToDB('lastAudio', audioFile);
          setShowUploader(false);
          localStorage.setItem('lastSavedTime', '0');
        }
        if (srtFile) {
          setSrtFileName(srtFile.name);
          const reader = new FileReader();
          reader.onload = async (ev) => { setSubtitles(parseSRT(ev.target.result)); await saveToDB('lastSrt', srtFile); };
          reader.readAsText(srtFile, 'utf-8');
        }
      };

      return (
        <div className={`flex flex-col items-center w-full ${showSubtitleList ? 'h-screen overflow-hidden' : 'min-h-screen p-4 md:p-8'}`}>
          <div className={`w-full max-w-4xl flex flex-col ${showSubtitleList ? 'h-full' : 'space-y-6'}`}>
            
            {!showSubtitleList && (
              <React.Fragment>
                <div className="bg-neutral-800 rounded-2xl p-6 shadow-xl border border-neutral-700 mt-8">
                  <div className={`flex justify-between items-center ${showUploader ? 'mb-6' : ''}`}>
                    <h1 className="text-xl md:text-2xl font-bold flex items-center gap-2 text-blue-400">
                      <Icon name={showUploader ? "folder-plus" : "disc"} className="w-6 h-6 mr-1" /> 
                      {showUploader ? "Load Media" : "Media"}
                    </h1>
                    <button onClick={() => setShowUploader(!showUploader)} className="flex items-center gap-2 px-3 py-1.5 bg-neutral-700 hover:bg-neutral-600 rounded-lg text-sm font-medium transition text-neutral-200">
                      <Icon name={showUploader ? "chevron-up" : "chevron-down"} className="w-4 h-4" />
                      {showUploader ? "Close" : "Open"}
                    </button>
                  </div>
                  {showUploader ? (
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      <label className="border-2 border-dashed border-neutral-600 rounded-xl p-4 hover:bg-neutral-700/50 transition flex flex-col items-center justify-center cursor-pointer h-32 group">
                        <input type="file" accept="audio/*,.srt" multiple onChange={handleAudioUpload} className="hidden" />
                        <Icon name="music" className="w-8 h-8 mb-2 text-neutral-400 group-hover:text-blue-400" />
                        <span className="text-sm text-neutral-300 truncate w-full text-center">{audioFileName || "Select Audio"}</span>
                      </label>
                      <label className="border-2 border-dashed border-neutral-600 rounded-xl p-4 hover:bg-neutral-700/50 transition flex flex-col items-center justify-center cursor-pointer h-32 group">
                        <input type="file" accept=".srt" onChange={(e) => {
                          const f = e.target.files[0];
                          if(f){ setSrtFileName(f.name); const r = new FileReader(); r.onload=async(ev)=>{setSubtitles(parseSRT(ev.target.result)); await saveToDB('lastSrt', f);}; r.readAsText(f, 'utf-8');}
                        }} className="hidden" />
                        <Icon name="file-text" className="w-8 h-8 mb-2 text-neutral-400 group-hover:text-green-400" />
                        <span className="text-sm text-neutral-300 truncate w-full text-center">{srtFileName || "Select SRT"}</span>
                      </label>
                    </div>
                  ) : (
                    <div className="flex flex-col md:flex-row gap-4 mt-4 text-sm text-neutral-400 bg-neutral-900/50 p-4 rounded-xl border border-neutral-700/50">
                      <div className="flex items-center gap-2 flex-1 min-w-0"><Icon name="music" className="w-4 h-4 text-blue-400" /><span className="truncate">{audioFileName}</span></div>
                      <div className="flex items-center gap-2 flex-1 min-w-0"><Icon name="file-text" className="w-4 h-4 text-green-400" /><span className="truncate">{srtFileName}</span></div>
                    </div>
                  )}
                </div>

                <div className="bg-neutral-800 rounded-2xl p-6 shadow-xl border border-neutral-700">
                  <div className="min-h-[140px] bg-neutral-900 rounded-xl p-6 flex items-center justify-center text-center mb-6 border border-neutral-700">
                    {currentSubtitleIndex !== -1 && subtitles[currentSubtitleIndex] ? (
                      <p className="text-2xl md:text-3xl font-normal text-white whitespace-pre-line">{subtitles[currentSubtitleIndex].text}</p>
                    ) : (
                      <p className="text-lg text-neutral-500">{audioSrc ? "No Subtitle" : "Upload Files"}</p>
                    )}
                  </div>
                  <div className="relative w-full h-3 bg-neutral-700 rounded-full mb-2">
                    <input type="range" min="0" max={duration || 100} value={currentTime} onChange={(e) => { const v=parseFloat(e.target.value); audioRef.current.currentTime=v; setCurrentTime(v); }} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                    <div className="absolute top-0 left-0 h-full bg-blue-500 rounded-full" style={{ width: `${duration ? (currentTime / duration) * 100 : 0}%` }}></div>
                  </div>
                  <div className="flex justify-between text-xs text-neutral-400 font-mono mb-8 px-1"><span>{formatTime(currentTime)}</span><span>{formatTime(duration)}</span></div>
                  <div className="flex flex-col gap-6">
                    <div className="flex flex-col md:flex-row items-center justify-between gap-6">
                      <div className="flex items-center gap-3">
                        <button onClick={() => audioRef.current.currentTime -= 5} className="p-2 text-neutral-400 hover:text-white"><Icon name="rotate-ccw" className="w-5 h-5" /></button>
                        <button onClick={togglePlay} className="w-12 h-12 bg-blue-500 rounded-full flex items-center justify-center shadow-lg active:scale-95 transition">
                          {isPlaying ? <Icon name="pause" className="w-5 h-5" /> : <Icon name="play" className="w-5 h-5 ml-1" />}
                        </button>
                        <button onClick={() => audioRef.current.currentTime += 5} className="p-2 text-neutral-400 hover:text-white transform -scale-x-100"><Icon name="rotate-ccw" className="w-5 h-5" /></button>
                      </div>
                      <div className="flex items-center gap-1 bg-neutral-900 p-1.5 rounded-xl border border-neutral-700 overflow-x-auto">
                        {[0.8, 1, 1.1, 1.2, 1.3].map(rate => (
                          <button key={rate} onClick={() => setPlaybackRate(rate)} className={`px-3 py-2 text-sm font-bold rounded-lg transition min-w-[44px] ${playbackRate === rate ? 'bg-blue-500 text-white shadow-md' : 'bg-neutral-800 text-neutral-400'}`}>{rate}x</button>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>
              </React.Fragment>
            )}

            <audio ref={audioRef} src={audioSrc || undefined} 
              onTimeUpdate={() => {
                const t = audioRef.current.currentTime;
                setCurrentTime(t);
                localStorage.setItem('lastSavedTime', Math.floor(t).toString());
                const idx = subtitles.findIndex(s => t >= s.start && t <= s.end);
                if (idx !== currentSubtitleIndex) {
                  setCurrentSubtitleIndex(idx);
                  if (showSubtitleList && idx !== -1 && subtitleListRef.current) {
                    // ★ 핵심 수정: 활성 자막(idx) 위에 직전 자막(idx-1) 하나만 보이게 스크롤
                    // 활성 자막이 0번이 아닐 경우, 직전 자막(idx-1)을 맨 위로 스크롤함
                    const targetIdx = idx > 0 ? idx - 1 : idx;
                    const targetElem = subtitleListRef.current.children[targetIdx];
                    if (targetElem) {
                      targetElem.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                  }
                }
              }} 
              onLoadedMetadata={() => {
                setDuration(audioRef.current.duration);
                const saved = parseFloat(localStorage.getItem('lastSavedTime') || '0');
                if (saved < audioRef.current.duration) audioRef.current.currentTime = saved;
                audioRef.current.playbackRate = playbackRate;
              }}
              onEnded={() => setIsPlaying(false)} className="hidden" 
            />

            {subtitles.length > 0 && (
              <div className={`flex flex-col transition-all duration-300 ${showSubtitleList ? 'flex-1 h-full rounded-none' : 'rounded-2xl p-6 mb-8 h-auto'} border ${isLightMode && showSubtitleList ? 'bg-white border-gray-300 shadow-none' : 'bg-[#171717] border-neutral-700 shadow-xl'}`}>
                
                <div className={`flex justify-between items-center mb-4 border-b pb-4 px-4 header-safe-area ${isLightMode && showSubtitleList ? 'border-gray-200' : 'border-neutral-700'}`}>
                  <h2 className={`text-lg font-bold flex items-center gap-2 ${isLightMode && showSubtitleList ? 'text-gray-800' : 'text-neutral-200'}`}>
                    <Icon name="list" className="w-5 h-5 mr-2" /> List
                  </h2>
                  <div className="flex items-center gap-2">
                    {showSubtitleList && (
                      <button onClick={() => setIsLightMode(!isLightMode)} className={`px-3 py-1.5 rounded-lg text-sm font-medium transition ${isLightMode ? 'bg-gray-200 text-gray-800' : 'bg-neutral-700 text-neutral-200'}`}>
                        <Icon name={isLightMode ? "moon" : "sun"} className="w-4 h-4 mr-1" /> {isLightMode ? "Dark" : "Light"}
                      </button>
                    )}
                    <button onClick={() => setShowSubtitleList(!showSubtitleList)} className={`flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-medium transition ${isLightMode && showSubtitleList ? 'bg-gray-200 text-gray-800' : 'bg-neutral-700 text-neutral-200'}`}>
                      <Icon name={showSubtitleList ? "eye-off" : "eye"} className="w-4 h-4 mr-1" /> {showSubtitleList ? "Player" : "List"}
                    </button>
                  </div>
                </div>

                {showSubtitleList && (
                  <div className={`flex-1 overflow-y-auto px-4 pb-10 space-y-2 ${isLightMode ? 'light-scrollbar' : 'custom-scrollbar'}`} ref={subtitleListRef}>
                    {subtitles.map((sub, index) => {
                      const isActive = index === currentSubtitleIndex;
                      const inactiveColorClass = isLightMode ? 'text-black opacity-100' : 'text-neutral-500';
                      const activeColorClass = isLightMode ? 'text-black font-semibold' : 'text-white font-normal';

                      return (
                        <div key={index} 
                          onClick={() => handleSubtitleClick(index, sub.start)}
                          className={`p-4 rounded-xl cursor-pointer transition border ${isActive ? (isLightMode ? 'bg-transparent border-yellow-400 shadow-sm' : 'bg-transparent border-neutral-500 shadow-lg shadow-blue-900/10') : 'border-transparent'}`}
                        >
                          <div className={`text-xs font-mono mb-1 ${isActive ? (isLightMode ? 'text-yellow-700' : 'text-yellow-500') : 'text-neutral-500'}`}>{formatTime(sub.start)}</div>
                          <div className={`whitespace-pre-line leading-relaxed transition-all duration-300 ${isActive ? `text-[25.2px] md:text-[31.5px] ${activeColorClass}` : `text-[16.8px] md:text-[20px] ${inactiveColorClass}`}`}>
                            {sub.text}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
