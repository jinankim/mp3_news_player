<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>구간반복 MP3 플레이어</title>
  <!-- Tailwind CSS 마법의 스크립트 (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React 및 Babel (단일 파일에서 React를 구동하기 위한 스크립트) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Lucide 아이콘 대신 Feather 아이콘 사용 (브라우저 직결을 위해) -->
  <script src="https://unpkg.com/feather-icons"></script>

  <style>
    /* 커스텀 스크롤바 디자인 */
    .custom-scrollbar::-webkit-scrollbar { width: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #262626; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #525252; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #737373; }
  </style>
</head>
<body class="bg-[#171717] text-white m-0 p-0 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // 아이콘 컴포넌트들 (Feather Icons 래핑)
    const Icon = ({ name, className = "" }) => (
      <i data-feather={name} className={className}></i>
    );

    // 시간 변환 유틸리티 함수들
    const timeToSeconds = (timeStr) => {
      if (!timeStr) return 0;
      const parts = timeStr.replace(',', '.').split(':');
      if (parts.length === 3) {
        const hours = parseInt(parts[0], 10);
        const minutes = parseInt(parts[1], 10);
        const seconds = parseFloat(parts[2]);
        return hours * 3600 + minutes * 60 + seconds;
      }
      return 0;
    };

    const formatTime = (totalSeconds) => {
      if (isNaN(totalSeconds)) return "00:00";
      const h = Math.floor(totalSeconds / 3600);
      const m = Math.floor((totalSeconds % 3600) / 60);
      const s = Math.floor(totalSeconds % 60);
      const ms = Math.floor((totalSeconds % 1) * 100);
      
      if (h > 0) {
        return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
      }
      return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}.${ms.toString().padStart(2, '0')}`;
    };

    const parseSRT = (srtText) => {
      const blocks = srtText.replace(/\r\n/g, '\n').replace(/\r/g, '\n').trim().split(/\n\s*\n/);
      const parsed = [];
      blocks.forEach((block) => {
        const lines = block.split('\n');
        if (lines.length >= 3) {
          const id = lines[0];
          const timecode = lines[1];
          const text = lines.slice(2).join('\n');
          const timeParts = timecode.split(' --> ');
          if (timeParts.length === 2) {
            parsed.push({
              id,
              start: timeToSeconds(timeParts[0]),
              end: timeToSeconds(timeParts[1]),
              text
            });
          }
        }
      });
      return parsed;
    };

    function App() {
      // 컴포넌트 렌더링 후 아이콘 초기화
      useEffect(() => {
        feather.replace();
      });

      const audioRef = useRef(null);
      const subtitleListRef = useRef(null);
      
      const [audioSrc, setAudioSrc] = useState(null);
      const [audioFileName, setAudioFileName] = useState("");
      const [subtitles, setSubtitles] = useState([]);
      const [srtFileName, setSrtFileName] = useState("");
      
      const [isPlaying, setIsPlaying] = useState(false);
      const [currentTime, setCurrentTime] = useState(0);
      const [duration, setDuration] = useState(0);
      
      const [currentSubtitleIndex, setCurrentSubtitleIndex] = useState(-1);
      
      const [pointA, setPointA] = useState(null);
      const [pointB, setPointB] = useState(null);
      const [isRepeatActive, setIsRepeatActive] = useState(false);

      // 전체 자막 리스트 표시 여부 상태 추가
      const [showSubtitleList, setShowSubtitleList] = useState(true);

      const handleAudioUpload = (e) => {
        const files = Array.from(e.target.files || []);
        if (files.length === 0) return;

        let audioFile = null;
        let srtFile = null;

        // 선택된 파일들을 순회하며 오디오와 자막 파일 분류
        files.forEach(file => {
          if (file.type.startsWith('audio/') || file.name.match(/\.(mp3|wav|m4a|ogg|aac|flac)$/i)) {
            audioFile = file;
          } else if (file.name.match(/\.srt$/i)) {
            srtFile = file;
          }
        });

        // 오디오 파일 처리
        if (audioFile) {
          const url = URL.createObjectURL(audioFile);
          setAudioSrc(url);
          setAudioFileName(audioFile.name);
          setIsPlaying(false);
          resetState();
        }

        // 자막 파일이 함께 선택된 경우 자동으로 함께 처리
        if (srtFile) {
          setSrtFileName(srtFile.name);
          const reader = new FileReader();
          reader.onload = (event) => {
            if (typeof event.target?.result === 'string') {
              const parsed = parseSRT(event.target.result);
              setSubtitles(parsed);
              setShowSubtitleList(true); // 자막 파일 업로드 시 기본으로 열림
            }
          };
          reader.readAsText(srtFile, 'utf-8');
        }
      };

      const handleSrtUpload = (e) => {
        const file = e.target.files?.[0];
        if (file) {
          setSrtFileName(file.name);
          const reader = new FileReader();
          reader.onload = (event) => {
            if (typeof event.target?.result === 'string') {
              const parsed = parseSRT(event.target.result);
              setSubtitles(parsed);
              setShowSubtitleList(true); // 자막 파일 업로드 시 기본으로 열림
            }
          };
          reader.readAsText(file, 'utf-8');
        }
      };

      const resetState = () => {
        setPointA(null);
        setPointB(null);
        setIsRepeatActive(false);
        setCurrentSubtitleIndex(-1);
      };

      const togglePlay = () => {
        if (!audioRef.current || !audioSrc) return;
        if (isPlaying) {
          audioRef.current.pause();
        } else {
          audioRef.current.play();
        }
        setIsPlaying(!isPlaying);
      };

      const handleTimeUpdate = () => {
        if (!audioRef.current) return;
        const time = audioRef.current.currentTime;
        setCurrentTime(time);

        if (isRepeatActive && pointA !== null && pointB !== null) {
          if (time >= pointB) {
            audioRef.current.currentTime = pointA;
            if (audioRef.current.paused) {
              audioRef.current.play();
              setIsPlaying(true);
            }
          }
        }

        if (subtitles.length > 0) {
          const activeIndex = subtitles.findIndex(sub => time >= sub.start && time <= sub.end);
          if (activeIndex !== currentSubtitleIndex) {
            setCurrentSubtitleIndex(activeIndex);
            
            // 리스트가 열려있을 때만 자동 스크롤
            if (showSubtitleList && activeIndex !== -1 && subtitleListRef.current) {
              const activeElement = subtitleListRef.current.children[activeIndex];
              if (activeElement) {
                activeElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
              }
            }
          }
        }
      };

      const handleLoadedMetadata = () => {
        if (audioRef.current) {
          setDuration(audioRef.current.duration);
        }
      };

      const handleSeek = (e) => {
        const newTime = parseFloat(e.target.value);
        if (audioRef.current) {
          audioRef.current.currentTime = newTime;
          setCurrentTime(newTime);
        }
      };

      const seekToTime = (time) => {
        if (audioRef.current) {
          audioRef.current.currentTime = time;
          setCurrentTime(time);
          if (!isPlaying) {
            audioRef.current.play();
            setIsPlaying(true);
          }
        }
      };

      const setA = () => setPointA(currentTime);
      const setB = () => {
        if (pointA !== null && currentTime > pointA) {
          setPointB(currentTime);
          setIsRepeatActive(true);
        } else {
          alert("B 지점은 A 지점보다 뒤에 있어야 합니다.");
        }
      };
      const clearAB = () => {
        setPointA(null);
        setPointB(null);
        setIsRepeatActive(false);
      };
      const toggleRepeat = () => {
        if (pointA !== null && pointB !== null) {
          setIsRepeatActive(!isRepeatActive);
        }
      };

      const skip = (amount) => {
        if (audioRef.current) {
          audioRef.current.currentTime += amount;
        }
      };

      return (
        <div className="min-h-screen flex flex-col items-center w-full p-4 md:p-8">
          <div className="w-full max-w-4xl space-y-6">
            
            {/* 미디어 파일 로드 섹션 */}
            <div className="bg-neutral-800 rounded-2xl p-6 shadow-xl border border-neutral-700 mt-8">
              <h1 className="text-2xl font-bold mb-6 flex items-center gap-2 text-blue-400">
                <Icon name="settings" className="w-6 h-6" /> 미디어 파일 로드
              </h1>
              
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <label className="relative border-2 border-dashed border-neutral-600 rounded-xl p-4 hover:bg-neutral-700/50 transition flex flex-col items-center justify-center cursor-pointer h-32 group">
                  <input type="file" accept="audio/*,.srt" multiple onChange={handleAudioUpload} className="hidden" />
                  <Icon name="music" className="w-8 h-8 mb-2 text-neutral-400 group-hover:text-blue-400 transition" />
                  <span className="text-sm font-medium text-center text-neutral-300">
                    {audioFileName ? audioFileName : "오디오 선택 (자막과 함께 다중 선택 가능)"}
                  </span>
                </label>

                <label className="relative border-2 border-dashed border-neutral-600 rounded-xl p-4 hover:bg-neutral-700/50 transition flex flex-col items-center justify-center cursor-pointer h-32 group">
                  <input type="file" accept=".srt" onChange={handleSrtUpload} className="hidden" />
                  <Icon name="file-text" className="w-8 h-8 mb-2 text-neutral-400 group-hover:text-green-400 transition" />
                  <span className="text-sm font-medium text-center text-neutral-300">
                    {srtFileName ? srtFileName : "SRT 자막 파일 선택"}
                  </span>
                </label>
              </div>
            </div>

            {/* 플레이어 영역 */}
            <div className="bg-neutral-800 rounded-2xl p-6 shadow-xl border border-neutral-700">
              <audio 
                ref={audioRef}
                src={audioSrc || undefined}
                onTimeUpdate={handleTimeUpdate}
                onLoadedMetadata={handleLoadedMetadata}
                onEnded={() => setIsPlaying(false)}
                className="hidden"
              />

              <div className="min-h-[140px] bg-neutral-900 rounded-xl p-6 flex items-center justify-center text-center mb-6 border border-neutral-700 shadow-inner">
                {currentSubtitleIndex !== -1 && subtitles[currentSubtitleIndex] ? (
                  <p className="text-2xl md:text-3xl font-bold leading-relaxed tracking-wide text-yellow-400 whitespace-pre-line drop-shadow-md transition-all duration-200">
                    {subtitles[currentSubtitleIndex].text}
                  </p>
                ) : (
                  <p className="text-lg text-neutral-500 whitespace-pre-line">
                    {audioSrc ? "자막이 없는 구간입니다." : "오디오와 자막 파일을 업로드 해주세요."}
                  </p>
                )}
              </div>

              <div className="relative w-full h-3 bg-neutral-700 rounded-full mb-2 cursor-pointer group">
                <input 
                  type="range" min="0" max={duration || 100} value={currentTime} onChange={handleSeek}
                  className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" disabled={!audioSrc}
                />
                <div className="absolute top-0 left-0 h-full bg-blue-500 rounded-full pointer-events-none" style={{ width: `${duration ? (currentTime / duration) * 100 : 0}%` }}></div>
                
                {pointA !== null && duration > 0 && <div className="absolute top-[-4px] w-1.5 h-5 bg-green-400 z-0 rounded-full shadow-[0_0_8px_rgba(74,222,128,0.8)]" style={{ left: `${(pointA / duration) * 100}%` }} title="A 지점" />}
                {pointB !== null && duration > 0 && <div className="absolute top-[-4px] w-1.5 h-5 bg-red-400 z-0 rounded-full shadow-[0_0_8px_rgba(248,113,113,0.8)]" style={{ left: `${(pointB / duration) * 100}%` }} title="B 지점" />}
                {pointA !== null && pointB !== null && duration > 0 && isRepeatActive && (
                  <div className="absolute top-0 h-full bg-blue-400/40 z-0 pointer-events-none" style={{ left: `${(pointA / duration) * 100}%`, width: `${((pointB - pointA) / duration) * 100}%` }} />
                )}
              </div>

              <div className="flex justify-between text-xs text-neutral-400 font-mono mb-8 px-1">
                <span>{formatTime(currentTime)}</span>
                <span>{formatTime(duration)}</span>
              </div>

              <div className="flex flex-col md:flex-row items-center justify-between gap-6">
                <div className="flex items-center gap-4">
                  <button onClick={() => skip(-5)} disabled={!audioSrc} className="p-2 text-neutral-400 hover:text-white disabled:opacity-50 transition">
                    <Icon name="rotate-ccw" className="w-6 h-6" />
                  </button>
                  
                  {/* 플레이/일시정지 버튼 (첨부된 이미지 스타일 적용) */}
                  <button 
                    onClick={togglePlay} 
                    disabled={!audioSrc} 
                    className="w-16 h-16 bg-blue-500 text-white flex items-center justify-center hover:bg-blue-600 disabled:opacity-50 disabled:bg-neutral-600 shadow-lg shadow-blue-500/20 transition-all duration-300 transform active:scale-95 rounded-full"
                  >
                    {isPlaying ? (
                      /* 일시정지 아이콘 (두 개의 둥근 세로 막대) */
                      <svg viewBox="0 0 24 24" fill="currentColor" className="w-8 h-8">
                        <rect x="6" y="5" width="4" height="14" rx="2" />
                        <rect x="14" y="5" width="4" height="14" rx="2" />
                      </svg>
                    ) : (
                      /* 플레이 아이콘 (삼각형) */
                      <svg viewBox="0 0 24 24" fill="currentColor" className="w-8 h-8 ml-1.5" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round">
                        <path d="M6 4l14 8-14 8z" />
                      </svg>
                    )}
                  </button>

                  <button onClick={() => skip(5)} disabled={!audioSrc} className="p-2 text-neutral-400 hover:text-white disabled:opacity-50 transition transform -scale-x-100">
                    <Icon name="rotate-ccw" className="w-6 h-6" />
                  </button>
                </div>

                <div className="flex items-center gap-2 bg-neutral-900 p-2 rounded-xl border border-neutral-700">
                  <button onClick={setA} disabled={!audioSrc} className={`px-4 py-2 text-sm font-bold rounded-lg transition flex items-center gap-1 ${pointA !== null ? 'bg-green-500/20 text-green-400' : 'bg-neutral-800 text-neutral-300 hover:bg-neutral-700'}`}>
                    A {pointA !== null && <span className="text-xs font-normal">({formatTime(pointA)})</span>}
                  </button>
                  
                  <button onClick={setB} disabled={!audioSrc || pointA === null} className={`px-4 py-2 text-sm font-bold rounded-lg transition flex items-center gap-1 ${pointB !== null ? 'bg-red-500/20 text-red-400' : 'bg-neutral-800 text-neutral-300 hover:bg-neutral-700'}`}>
                    B {pointB !== null && <span className="text-xs font-normal">({formatTime(pointB)})</span>}
                  </button>

                  <div className="w-px h-8 bg-neutral-700 mx-1"></div>

                  <button onClick={toggleRepeat} disabled={pointA === null || pointB === null} className={`p-2 rounded-lg transition ${isRepeatActive ? 'bg-blue-500 text-white' : 'bg-neutral-800 text-neutral-400 hover:bg-neutral-700'}`}>
                    <Icon name="repeat" className="w-5 h-5" />
                  </button>

                  <button onClick={clearAB} disabled={pointA === null && pointB === null} className="p-2 bg-neutral-800 text-neutral-400 rounded-lg hover:bg-neutral-700 hover:text-red-400 transition" title="구간 초기화">
                    <Icon name="trash-2" className="w-5 h-5" />
                  </button>
                </div>
              </div>
            </div>

            {/* 자막 리스트 */}
            {subtitles.length > 0 && (
              <div className={`bg-neutral-800 rounded-2xl p-6 shadow-xl border border-neutral-700 flex flex-col mb-8 transition-all duration-300 ${showSubtitleList ? 'h-96' : 'h-auto'}`}>
                {/* 헤더 및 토글 버튼 */}
                <div className="flex justify-between items-center mb-4 border-b border-neutral-700 pb-2">
                  <h2 className="text-lg font-bold flex items-center gap-2 text-neutral-200">
                    <Icon name="list" className="w-5 h-5 text-neutral-400" /> 전체 자막 리스트
                  </h2>
                  <button 
                    onClick={() => setShowSubtitleList(!showSubtitleList)}
                    className="flex items-center gap-2 px-3 py-1.5 bg-neutral-700 hover:bg-neutral-600 active:bg-neutral-500 rounded-lg text-sm font-medium text-neutral-200 transition"
                  >
                    <Icon name={showSubtitleList ? "eye-off" : "eye"} className="w-4 h-4" />
                    {showSubtitleList ? "리스트 닫기" : "리스트 열기"}
                  </button>
                </div>
                
                {/* 자막 리스트 내용 */}
                {showSubtitleList && (
                  <div className="flex-1 overflow-y-auto pr-2 space-y-2 custom-scrollbar" ref={subtitleListRef}>
                    {subtitles.map((sub, index) => {
                      const isActive = index === currentSubtitleIndex;
                      return (
                        <div 
                          key={index}
                          onClick={() => seekToTime(sub.start)}
                          className={`p-3 rounded-xl cursor-pointer transition border ${
                            isActive 
                              ? 'bg-yellow-500/20 border-yellow-500/50 text-yellow-400 shadow-[0_0_15px_rgba(234,179,8,0.15)]' 
                              : 'border-transparent hover:bg-neutral-700/50 text-neutral-300'
                          }`}
                        >
                          <div className={`text-xs font-mono mb-1 ${isActive ? 'text-yellow-500/70' : 'text-neutral-500'}`}>
                            {formatTime(sub.start)} - {formatTime(sub.end)}
                          </div>
                          <div className={`text-[15px] whitespace-pre-line leading-relaxed ${isActive ? 'font-bold' : 'font-normal'}`}>
                            {sub.text}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
